<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60" width="60" height="60">
  <!-- 战车主体（长方形车身） -->
  <rect x="14" y="10" width="32" height="40" rx="2"
        fill="none" stroke="#ff00ff" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- 车顶横梁 -->
  <line x1="10" y1="18" x2="50" y2="18" stroke="#ff00ff" stroke-width="2.5" stroke-linecap="round"/>
  <!-- 车底横梁 -->
  <line x1="10" y1="42" x2="50" y2="42" stroke="#ff00ff" stroke-width="2.5" stroke-linecap="round"/>
  <!-- 车轴（左） -->
  <line x1="10" y1="14" x2="10" y2="22" stroke="#ff00ff" stroke-width="2" stroke-linecap="round"/>
  <!-- 车轴（右） -->
  <line x1="50" y1="14" x2="50" y2="22" stroke="#ff00ff" stroke-width="2" stroke-linecap="round"/>
  <!-- 车轴（左下） -->
  <line x1="10" y1="38" x2="10" y2="46" stroke="#ff00ff" stroke-width="2" stroke-linecap="round"/>
  <!-- 车轴（右下） -->
  <line x1="50" y1="38" x2="50" y2="46" stroke="#ff00ff" stroke-width="2" stroke-linecap="round"/>
  <!-- 车轮（左上） -->
  <circle cx="10" cy="12" r="3" fill="none" stroke="#ff00ff" stroke-width="1.5"/>
  <!-- 车轮（右上） -->
  <circle cx="50" cy="12" r="3" fill="none" stroke="#ff00ff" stroke-width="1.5"/>
  <!-- 车轮（左下） -->
  <circle cx="10" cy="48" r="3" fill="none" stroke="#ff00ff" stroke-width="1.5"/>
  <!-- 车轮（右下） -->
  <circle cx="50" cy="48" r="3" fill="none" stroke="#ff00ff" stroke-width="1.5"/>
  <!-- 车厢内部线条 -->
  <line x1="22" y1="26" x2="38" y2="26" stroke="#ff00ff" stroke-width="1.5" opacity="0.6"/>
  <line x1="22" y1="34" x2="38" y2="34" stroke="#ff00ff" stroke-width="1.5" opacity="0.6"/>
</svg>