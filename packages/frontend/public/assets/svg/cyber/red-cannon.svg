<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60" width="60" height="60">
  <!-- 炮管（长矩形） -->
  <rect x="22" y="6" width="16" height="48" rx="3"
        fill="none" stroke="#00f0ff" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- 炮口 -->
  <ellipse cx="30" cy="8" rx="8" ry="3" fill="none" stroke="#00f0ff" stroke-width="2"/>
  <!-- 炮尾 -->
  <ellipse cx="30" cy="52" rx="8" ry="3" fill="none" stroke="#00f0ff" stroke-width="2"/>
  <!-- 炮身装饰线 -->
  <line x1="26" y1="20" x2="34" y2="20" stroke="#00f0ff" stroke-width="1.5" opacity="0.6"/>
  <line x1="26" y1="40" x2="34" y2="40" stroke="#00f0ff" stroke-width="1.5" opacity="0.6"/>
  <!-- 中心点 -->
  <circle cx="30" cy="30" r="3" fill="#00f0ff"/>
</svg>