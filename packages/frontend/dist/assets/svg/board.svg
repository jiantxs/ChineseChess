<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 575" width="520" height="575">
  <defs>
    <pattern id="wood" patternUnits="userSpaceOnUse" width="100" height="100">
      <rect width="100" height="100" fill="#f4e4c1"/>
      <path d="M0,0 Q50,20 100,0 M0,30 Q50,50 100,30 M0,60 Q50,80 100,60 M0,90 Q50,110 100,90"
            stroke="#e8d5a3" stroke-width="0.5" fill="none"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="520" height="575" fill="url(#wood)" rx="8"/>
  <rect x="10" y="10" width="500" height="555" fill="none" stroke="#8B4513" stroke-width="3" rx="4"/>

  <!-- Grid Lines Group -->
  <g stroke="#333" stroke-width="1.5" fill="none">
    <!-- Horizontal lines (10 lines for 9 rows) -->
    <g id="horizontal-lines">
      <line x1="35" y1="35" x2="485" y2="35"/>
      <line x1="35" y1="90" x2="485" y2="90"/>
      <line x1="35" y1="145" x2="485" y2="145"/>
      <line x1="35" y1="200" x2="485" y2="200"/>
      <line x1="35" y1="255" x2="485" y2="255"/>
      <line x1="35" y1="310" x2="485" y2="310"/>
      <line x1="35" y1="365" x2="485" y2="365"/>
      <line x1="35" y1="420" x2="485" y2="420"/>
      <line x1="35" y1="475" x2="485" y2="475"/>
      <line x1="35" y1="530" x2="485" y2="530"/>
    </g>

    <!-- Vertical lines top (y=35 to y=255 for rows 0-4) -->
    <g id="vertical-lines-top">
      <line x1="35" y1="35" x2="35" y2="255"/>
      <line x1="90" y1="35" x2="90" y2="255"/>
      <line x1="145" y1="35" x2="145" y2="255"/>
      <line x1="200" y1="35" x2="200" y2="255"/>
      <line x1="255" y1="35" x2="255" y2="255"/>
      <line x1="310" y1="35" x2="310" y2="255"/>
      <line x1="365" y1="35" x2="365" y2="255"/>
      <line x1="420" y1="35" x2="420" y2="255"/>
      <line x1="485" y1="35" x2="485" y2="255"/>
    </g>

    <!-- Vertical lines bottom (y=310 to y=530 for rows 5-9) -->
    <g id="vertical-lines-bottom">
      <line x1="35" y1="310" x2="35" y2="530"/>
      <line x1="90" y1="310" x2="90" y2="530"/>
      <line x1="145" y1="310" x2="145" y2="530"/>
      <line x1="200" y1="310" x2="200" y2="530"/>
      <line x1="255" y1="310" x2="255" y2="530"/>
      <line x1="310" y1="310" x2="310" y2="530"/>
      <line x1="365" y1="310" x2="365" y2="530"/>
      <line x1="420" y1="310" x2="420" y2="530"/>
      <line x1="485" y1="310" x2="485" y2="530"/>
    </g>
  </g>

  <!-- Palace diagonals -->
  <g stroke="#333" stroke-width="1.5" fill="none">
    <line x1="200" y1="35" x2="310" y2="145"/>
    <line x1="310" y1="35" x2="200" y2="145"/>
    <line x1="200" y1="420" x2="310" y2="530"/>
    <line x1="310" y1="420" x2="200" y2="530"/>
  </g>

  <!-- River labels -->
  <g font-family="KaiTi, STKaiti, serif" font-size="28" fill="#666" stroke="none">
    <text x="160" y="285">楚 河</text>
    <text x="320" y="285">汉 界</text>
  </g>

